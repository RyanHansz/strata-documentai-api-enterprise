version: 2

updates:
  # Python API (uv / pip ecosystem)
  - package-ecosystem: "pip"
    directory: "/documentai-api"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # Admin UI (npm)
  - package-ecosystem: "npm"
    directory: "/admin-ui"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # Terraform (dev environment)
  - package-ecosystem: "terraform"
    directory: "/infra/environments/dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        patterns:
          - "*"
